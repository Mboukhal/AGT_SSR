root = "."
testdata_dir = "/tmp/testdata"
tmp_dir = "/tmp/air/"

[build]
entrypoint = "/tmp/air/bin/main"
args_bin = []
cmd = "go build -o /tmp/air/bin/main ./cmd/main.go"
delay = 100
exclude_dir = [
  "assets",
  "tmp",
  "vendor",
  "services",
  "node_modules",
  "ui",
  "dist",
  ".git",
  ".vscode",
  "migration",
  "cmd/seed"
]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html"]
include_file = []
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = []
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = false
clean_on_exit = true

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
silent = true
time = false

[misc]
clean_on_exit = true

[proxy]
app_port = 0
enabled = false
proxy_port = 0

[screen]
clear_on_rebuild = false
keep_scroll = true
