
name: ${APP_NAME}

services:
  db:
    image: postgres:18.3-alpine3.22
    container_name: db_${APP_NAME}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 127.0.0.1:${POSTGRES_PORT}:5432
    volumes:
      - db_data:/var/lib/postgresql
    restart: always

  storage:
    image: dxflrs/garage:v2.3.0
    container_name: storage_${APP_NAME}
    volumes:
      - ./services/storage/garage.toml:/etc/garage.toml
      - ./services/storage/meta:/var/lib/garage/meta
      - ./services/storage/data:/var/lib/garage/data
      # - storage_data:/var/lib/garage/meta
      # - storage_data:/var/lib/garage/data
    restart: unless-stopped
    ports:
      - 3900:3900
      - 3901:3901
      - 3902:3902
      - 3903:3903

  webui:
    image: khairul169/garage-webui:latest
    container_name: garage-webui
    restart: unless-stopped
    volumes:
      - ./services/storage/garage.toml:/etc/garage.toml:ro
    ports:
      - 3909:3909
    depends_on:
      - storage
    environment:
      API_BASE_URL: "http://storage_${APP_NAME}:3903"
      S3_ENDPOINT_URL: "http://storage_${APP_NAME}:3900"

volumes:
  db_data:
  storage_data:


